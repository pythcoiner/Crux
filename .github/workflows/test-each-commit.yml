name: Commit history check
on:
  pull_request:

env:
  IDF_COMMIT: 44c77cbf46844cd056c923277ece745173cb270d

jobs:
  # first we list all commits
  list-commits:
    if: github.event.pull_request.commits > 1
    runs-on: ubuntu-latest
    outputs:
      commits: ${{ steps.list.outputs.commits }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Fetch base branch
        run: |
          # NOT `--depth=1`: it marks the repo shallow at origin/master
          # and `git log origin/master..HEAD~` can't walk past the
          # boundary, returning the entire project history instead of
          # the PR range. fetch-depth: 0 on actions/checkout already
          # populated everything, so this is essentially free.
          git fetch --no-tags --prune origin \
            "+refs/heads/${GITHUB_BASE_REF}:refs/remotes/origin/${GITHUB_BASE_REF}"

      - id: list
        name: List intermediate commits
        run: |
          # HEAD is the PR tip -- already covered by github-actions-test.yml.
          range="origin/${GITHUB_BASE_REF}..HEAD~"
          # Emit "<full sha>\t<short sha> <subject>" per commit, then turn
          # it into a JSON array of {sha, name} objects for matrix.include.
          commits=$(git log --reverse --format='%H%x09%h %s' "$range" \
            | jq -R -s -c '
                split("\n")
                | map(select(length > 0))
                | map(split("\t"))
                | map({sha: .[0], name: .[1]})
              ')
          echo "Intermediate commits: $commits"
          echo "commits=$commits" >> "$GITHUB_OUTPUT"

  # second we start one CI task per commit
  check-commit:
    needs: list-commits
    if: needs.list-commits.outputs.commits != '[]' && needs.list-commits.outputs.commits != ''
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 360
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.list-commits.outputs.commits) }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ matrix.sha }}
          submodules: 'recursive'

      - name: Show commit
        run: git log -1 --oneline

      - name: Install clang-format
        run: sudo apt-get update && sudo apt-get install -y clang-format

      - name: Cache ESP-IDF
        uses: actions/cache@v4
        with:
          path: |
            ~/esp-idf
            ~/.espressif
          key: esp-idf-${{ env.IDF_COMMIT }}-esp32p4

      - name: Setup ESP-IDF
        run: |
          if [ -f ~/esp-idf/.idf_commit_ok ] && [ "$(cat ~/esp-idf/.idf_commit_ok)" = "$IDF_COMMIT" ]; then
            echo "ESP-IDF already at $IDF_COMMIT (cached)"
            exit 0
          fi
          if [ ! -d ~/esp-idf ]; then
            git clone https://github.com/espressif/esp-idf.git ~/esp-idf
          fi
          cd ~/esp-idf
          git fetch origin $IDF_COMMIT
          git checkout $IDF_COMMIT
          git submodule update --init --recursive
          ./install.sh esp32p4
          echo "$IDF_COMMIT" > .idf_commit_ok

      - name: Run CI checks
        run: |
          . ~/esp-idf/export.sh
          bash scripts/ci-checks.sh
