# descriptor-rework test fixtures manifest.
#
# Consumed ONE-TIME by scripts/gen-test-plan.py to produce the committed
# .cm/spec/TESTING_PLAN.md. Testers don't run the generator; they just read
# the markdown.
#
# Test mnemonic: the well-known BIP39 test vector
#   "abandon abandon abandon abandon abandon abandon abandon abandon
#    abandon abandon abandon about"
# Mainnet master fingerprint: 73c5da0a

fixtures:

  # --- Mnemonic (scanned during §1 bootstrap) ---

  - label: mnemonic_boot
    type: compact_seedqr
    # 128-bit entropy: all zeros => the "abandon ... about" vector
    entropy_hex: "00000000000000000000000000000000"
    note: BIP39 test vector; Compact SeedQR = 16 bytes.

  # --- Multisig descriptor (loaded in §5 so §6-§8 can use it) ---
  # Our xpub: m/48'/0'/0'/2' of the test mnemonic.
  # Cosigner xpub: fixed dummy (replace the `xpubCOSIGNER` literal with a
  # real xpub of your choice before first regeneration — the PSBT_E fixture
  # must be crafted for THIS exact descriptor).

  - label: desc_wsh_2of2
    type: plain
    payload: "wsh(sortedmulti(2,[73c5da0a/48'/0'/0'/2']xpubOURS,[deadbeef/48'/0'/0'/2']xpubCOSIGNER))#<cksum>"
    note: Multisig; no WARN expected (purpose 48 under wsh is the standard convention).

  # --- Descriptor registration WARN-dialog fixtures (§9) ---

  - label: desc_wpkh_custom_purpose99
    type: plain
    payload: "wpkh([73c5da0a/99'/0'/0']xpubCUSTOM99/<0;1>/*)#<cksum>"
    note: Purpose 99 — NA (no WARN; purpose outside standard table).

  - label: desc_tr_mismatch_purpose84
    type: plain
    payload: "tr([73c5da0a/84'/0'/0']xpubTR84/<0;1>/*)#<cksum>"
    note: Purpose 84 under tr — WARN expected.

  - label: desc_wsh_mismatch_purpose86
    type: plain
    payload: "wsh(sortedmulti(2,[73c5da0a/86'/0'/0']xpubWSH86A,[deadbeef/86'/0'/0']xpubWSH86B))#<cksum>"
    note: Purpose 86 under wsh — WARN expected.

  # --- PSBT signing fixtures (§4 + §6) ---

  - label: psbt_A_bip84_acct3
    type: psbt
    encoding: base64
    from_file: test-fixtures/raw/psbt_A_bip84_acct3.bin
    note: Input m/84'/0'/3'/0/12 — sign (account 3, not 0).

  - label: psbt_B_bip86
    type: psbt
    encoding: base64
    from_file: test-fixtures/raw/psbt_B_bip86.bin
    note: Input m/86'/0'/0'/1/4 — sign (taproot).

  - label: psbt_C_bip44_acct100
    type: psbt
    encoding: base64
    from_file: test-fixtures/raw/psbt_C_bip44_acct100.bin
    note: Input m/44'/0'/100'/0/0 — refuse (account ≥ 100).

  - label: psbt_D_bip84_idx100
    type: psbt
    encoding: base64
    from_file: test-fixtures/raw/psbt_D_bip84_idx100.bin
    note: Input m/84'/0'/0'/0/100 — refuse (index ≥ 100).

  - label: psbt_E_wsh_multisig
    type: psbt
    encoding: bbqr
    from_file: test-fixtures/raw/psbt_E_wsh_multisig.bin
    note: Needs desc_wsh_2of2 registered first (§5).

  - label: psbt_F_nonstandard_purpose
    type: psbt
    encoding: base64
    from_file: test-fixtures/raw/psbt_F_nonstandard_purpose.bin
    note: Input m/9999'/0'/0'/0/0. permissive=off → skip; permissive=on → ACK+sign.

  - label: psbt_G_attacker_swapped_utxo
    type: psbt
    encoding: base64
    from_file: test-fixtures/raw/psbt_G_attacker_swapped_utxo.bin
    note: Correct keypath but swapped UTXO script — refuse silently.

  - label: psbt_H_output_classification
    type: psbt
    encoding: base64
    from_file: test-fixtures/raw/psbt_H_output_classification.bin
    note: Owned output m/84'/0'/0'/1/3 + external output — classification test.

  - label: psbt_I_fp_only
    type: psbt
    encoding: base64
    from_file: test-fixtures/raw/psbt_I_fp_only.bin
    note: Output keypath has our fingerprint but non-matching path — must NOT be marked owned.

  # --- Address-checker fixtures (§8) ---

  - label: addr_bip84_acct2_idx5
    type: plain
    payload: "bc1ql774upt5yseuqhaffxlgvxuyr2xlps8v87f2ts"
    note: Native SegWit, m/84'/0'/2'/0/5 of the test mnemonic.

  - label: addr_random_not_ours
    type: plain
    payload: "bc1qxy2kgdygjrsqtzq2n0yrf2493p83kkfjhx0wlh"
    note: Arbitrary mainnet address unrelated to our mnemonic.

  - label: addr_registered_multisig
    type: plain
    payload: "bc1q<REPLACE-WITH-wsh-2of2-ADDRESS-AT-0/0>"
    note: Derived from desc_wsh_2of2 at multi_index=0, child=0.
